<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FRAMES — Visual Gallery</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink: #0e0e0e;
      --paper: #f5f0e8;
      --accent: #c8402f;
      --muted: #9a9488;
      --border: #d4cfc6;
      --overlay: rgba(14,14,14,0.92);
      --radius: 2px;
    }

    html { font-size: 16px; scroll-behavior: smooth; }

    body {
      background-color: var(--paper);
      color: var(--ink);
      font-family: 'DM Mono', monospace;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── NOISE TEXTURE ── */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none; z-index: 9999; opacity: 0.35;
    }

    /* ── HEADER ── */
    header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 2rem 4rem;
      border-bottom: 1px solid var(--border);
      position: sticky; top: 0; background: var(--paper);
      z-index: 100;
    }

    .logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2rem; font-weight: 300; letter-spacing: 0.25em;
      text-transform: uppercase; color: var(--ink);
    }
    .logo span { color: var(--accent); font-style: italic; }

    .header-meta {
      font-size: 0.65rem; letter-spacing: 0.15em;
      color: var(--muted); text-transform: uppercase;
    }

    /* ── FILTER BAR ── */
    .filter-bar {
      display: flex; align-items: center; gap: 0.5rem;
      padding: 1.5rem 4rem;
      border-bottom: 1px solid var(--border);
      overflow-x: auto; scrollbar-width: none;
    }
    .filter-bar::-webkit-scrollbar { display: none; }

    .filter-label {
      font-size: 0.6rem; letter-spacing: 0.2em;
      text-transform: uppercase; color: var(--muted);
      white-space: nowrap; margin-right: 0.5rem;
    }

    .filter-btn {
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem; letter-spacing: 0.12em; text-transform: uppercase;
      padding: 0.45rem 1.1rem;
      background: transparent; border: 1px solid var(--border);
      color: var(--muted); cursor: pointer;
      border-radius: var(--radius);
      transition: all 0.2s ease;
      white-space: nowrap;
    }
    .filter-btn:hover { border-color: var(--ink); color: var(--ink); }
    .filter-btn.active {
      background: var(--ink); color: var(--paper);
      border-color: var(--ink);
    }

    /* ── GALLERY GRID ── */
    .gallery-wrapper { padding: 3rem 4rem 6rem; }

    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(12, 1fr);
      grid-auto-rows: 80px;
      gap: 12px;
    }

    /* Masonry-like spanning */
    .gallery-item {
      position: relative; overflow: hidden;
      border-radius: var(--radius);
      cursor: pointer;
      transition: transform 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94),
                  box-shadow 0.4s ease,
                  opacity 0.35s ease;
    }

    .gallery-item:nth-child(5n+1) { grid-column: span 5; grid-row: span 4; }
    .gallery-item:nth-child(5n+2) { grid-column: span 4; grid-row: span 3; }
    .gallery-item:nth-child(5n+3) { grid-column: span 3; grid-row: span 4; }
    .gallery-item:nth-child(5n+4) { grid-column: span 4; grid-row: span 3; }
    .gallery-item:nth-child(5n+5) { grid-column: span 8; grid-row: span 4; }

    .gallery-item img {
      width: 100%; height: 100%; object-fit: cover;
      display: block;
      transition: transform 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94),
                  filter 0.4s ease;
      filter: saturate(0.88) contrast(1.02);
    }

    .gallery-item:hover { box-shadow: 0 20px 60px rgba(0,0,0,0.18); transform: translateY(-3px); }
    .gallery-item:hover img { transform: scale(1.06); filter: saturate(1.1) contrast(1.05); }

    /* Overlay info */
    .item-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(to top, rgba(14,14,14,0.7) 0%, transparent 50%);
      opacity: 0; transition: opacity 0.35s ease;
      display: flex; flex-direction: column;
      justify-content: flex-end; padding: 1.2rem;
    }
    .gallery-item:hover .item-overlay { opacity: 1; }

    .item-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.05rem; font-weight: 300; color: #fff;
      letter-spacing: 0.04em; margin-bottom: 0.2rem;
    }
    .item-cat {
      font-size: 0.6rem; letter-spacing: 0.18em;
      text-transform: uppercase; color: rgba(255,255,255,0.6);
    }

    /* Expand icon */
    .expand-icon {
      position: absolute; top: 1rem; right: 1rem;
      width: 32px; height: 32px;
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(4px);
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 50%; display: flex; align-items: center; justify-content: center;
      opacity: 0; transition: opacity 0.3s ease;
      color: #fff; font-size: 0.75rem;
    }
    .gallery-item:hover .expand-icon { opacity: 1; }

    /* Hidden items */
    .gallery-item.hidden {
      opacity: 0; pointer-events: none;
      transform: scale(0.97);
    }

    /* ── LIGHTBOX ── */
    .lightbox {
      position: fixed; inset: 0;
      background: var(--overlay);
      z-index: 1000;
      display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none;
      transition: opacity 0.4s ease;
      backdrop-filter: blur(6px);
    }
    .lightbox.open { opacity: 1; pointer-events: all; }

    .lb-container {
      position: relative;
      max-width: 88vw; max-height: 88vh;
      display: flex; flex-direction: column;
      transform: scale(0.95) translateY(20px);
      transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .lightbox.open .lb-container { transform: scale(1) translateY(0); }

    .lb-img-wrap {
      position: relative; overflow: hidden;
      border-radius: var(--radius);
      max-height: 78vh;
    }

    #lb-image {
      display: block;
      max-width: 88vw; max-height: 78vh;
      object-fit: contain;
      border-radius: var(--radius);
      transition: opacity 0.25s ease, transform 0.25s ease;
    }

    #lb-image.fade-out { opacity: 0; transform: scale(0.98); }

    /* Filter overlay on lightbox image */
    .lb-img-wrap::after {
      content: '';
      position: absolute; inset: 0;
      pointer-events: none; border-radius: var(--radius);
      mix-blend-mode: multiply;
      transition: background 0.3s ease;
    }

    .lb-meta {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0.9rem 0 0;
    }

    .lb-info .lb-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.2rem; font-weight: 300; color: #fff;
      letter-spacing: 0.05em;
    }
    .lb-info .lb-cat {
      font-size: 0.58rem; letter-spacing: 0.2em;
      text-transform: uppercase; color: rgba(255,255,255,0.45);
      margin-top: 0.15rem;
    }

    .lb-counter {
      font-size: 0.7rem; letter-spacing: 0.12em; color: rgba(255,255,255,0.4);
    }

    /* Nav buttons */
    .lb-nav {
      position: absolute; top: 50%;
      transform: translateY(-50%);
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      backdrop-filter: blur(8px);
      color: #fff; width: 48px; height: 48px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; font-size: 1rem;
      transition: background 0.2s, transform 0.2s;
    }
    .lb-nav:hover { background: rgba(255,255,255,0.2); transform: translateY(-50%) scale(1.08); }
    #lb-prev { left: -72px; }
    #lb-next { right: -72px; }

    .lb-close {
      position: absolute; top: -48px; right: 0;
      background: transparent; border: 1px solid rgba(255,255,255,0.2);
      color: rgba(255,255,255,0.7); width: 36px; height: 36px;
      border-radius: var(--radius); cursor: pointer; font-size: 0.9rem;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s;
    }
    .lb-close:hover { background: var(--accent); border-color: var(--accent); color: #fff; }

    /* Image filters strip */
    .lb-filters {
      display: flex; gap: 0.5rem; padding: 0.75rem 0 0; flex-wrap: wrap;
    }
    .lb-filter-btn {
      font-family: 'DM Mono', monospace;
      font-size: 0.58rem; letter-spacing: 0.12em; text-transform: uppercase;
      padding: 0.3rem 0.75rem;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.15);
      color: rgba(255,255,255,0.5); cursor: pointer; border-radius: 20px;
      transition: all 0.2s;
    }
    .lb-filter-btn:hover { border-color: rgba(255,255,255,0.4); color: rgba(255,255,255,0.8); }
    .lb-filter-btn.active { background: #fff; color: var(--ink); border-color: #fff; }

    /* ── RESPONSIVE ── */
    @media (max-width: 1024px) {
      header, .filter-bar, .gallery-wrapper { padding-left: 2rem; padding-right: 2rem; }
      #lb-prev { left: -52px; }
      #lb-next { right: -52px; }
    }

    @media (max-width: 768px) {
      header { padding: 1.2rem 1.5rem; }
      .logo { font-size: 1.5rem; }
      .filter-bar { padding: 1rem 1.5rem; }
      .gallery-wrapper { padding: 1.5rem 1.5rem 4rem; }

      .gallery-grid {
        grid-template-columns: repeat(2, 1fr);
        grid-auto-rows: 120px;
        gap: 8px;
      }
      .gallery-item:nth-child(n) { grid-column: span 1; grid-row: span 2; }
      .gallery-item:nth-child(5n+1),
      .gallery-item:nth-child(5n+5) { grid-column: span 2; grid-row: span 2; }

      #lb-prev { left: -40px; width: 36px; height: 36px; font-size: 0.85rem; }
      #lb-next { right: -40px; width: 36px; height: 36px; font-size: 0.85rem; }
    }

    @media (max-width: 480px) {
      .lb-container { max-width: 94vw; }
      #lb-prev { left: 4px; top: auto; bottom: -56px; transform: none; }
      #lb-next { right: 4px; top: auto; bottom: -56px; transform: none; }
    }

    /* ── SCROLL ANIMATION ── */
    .gallery-item {
      animation: fadeUp 0.5s ease both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .gallery-item:nth-child(1) { animation-delay: 0.05s; }
    .gallery-item:nth-child(2) { animation-delay: 0.1s;  }
    .gallery-item:nth-child(3) { animation-delay: 0.15s; }
    .gallery-item:nth-child(4) { animation-delay: 0.2s;  }
    .gallery-item:nth-child(5) { animation-delay: 0.25s; }
    .gallery-item:nth-child(6) { animation-delay: 0.3s;  }
    .gallery-item:nth-child(7) { animation-delay: 0.35s; }
    .gallery-item:nth-child(8) { animation-delay: 0.4s;  }
    .gallery-item:nth-child(9) { animation-delay: 0.45s; }
    .gallery-item:nth-child(10){ animation-delay: 0.5s;  }

    /* ── EMPTY STATE ── */
    .empty-state {
      display: none; grid-column: 1/-1;
      text-align: center; padding: 6rem 0;
      color: var(--muted); font-size: 0.75rem; letter-spacing: 0.15em;
      text-transform: uppercase;
    }
    .empty-state.show { display: block; }
  </style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="logo">FRAME<span>s</span></div>
  <div class="header-meta">Visual Archive — 2024</div>
</header>

<!-- FILTER BAR -->
<div class="filter-bar">
  <span class="filter-label">Filter:</span>
  <button class="filter-btn active" data-filter="all">All Works</button>
  <button class="filter-btn" data-filter="nature">Nature</button>
  <button class="filter-btn" data-filter="architecture">Architecture</button>
  <button class="filter-btn" data-filter="portrait">Portrait</button>
  <button class="filter-btn" data-filter="abstract">Abstract</button>
  <button class="filter-btn" data-filter="urban">Urban</button>
</div>

<!-- GALLERY -->
<main class="gallery-wrapper">
  <div class="gallery-grid" id="gallery"></div>
</main>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox">
  <div class="lb-container">
    <button class="lb-close" id="lb-close">✕</button>
    <div class="lb-img-wrap">
      <img id="lb-image" src="" alt="" />
    </div>
    <div class="lb-meta">
      <div class="lb-info">
        <div class="lb-title" id="lb-title"></div>
        <div class="lb-cat" id="lb-cat"></div>
      </div>
      <div class="lb-counter" id="lb-counter"></div>
    </div>
    <div class="lb-filters">
      <button class="lb-filter-btn active" data-css-filter="none">Original</button>
      <button class="lb-filter-btn" data-css-filter="grayscale(100%)">Noir</button>
      <button class="lb-filter-btn" data-css-filter="sepia(80%)">Sepia</button>
      <button class="lb-filter-btn" data-css-filter="saturate(200%) hue-rotate(15deg)">Vivid</button>
      <button class="lb-filter-btn" data-css-filter="contrast(130%) brightness(1.05)">Bold</button>
      <button class="lb-filter-btn" data-css-filter="invert(100%) hue-rotate(180deg)">Invert</button>
    </div>
    <button class="lb-nav" id="lb-prev">&#8592;</button>
    <button class="lb-nav" id="lb-next">&#8594;</button>
  </div>
</div>

<script>
  const images = [
    { title: "Golden Hour", cat: "nature",       url: "https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=900&auto=format&fit=crop" },
    { title: "Glass Tower", cat: "architecture", url: "https://images.unsplash.com/photo-1486325212027-8081e485255e?w=900&auto=format&fit=crop" },
    { title: "Still Waters", cat: "nature",      url: "https://images.unsplash.com/photo-1501854140801-50d01698950b?w=900&auto=format&fit=crop" },
    { title: "Studio Light", cat: "portrait",    url: "https://images.unsplash.com/photo-1531746020798-e6953c6e8e04?w=900&auto=format&fit=crop" },
    { title: "Vapor Trails", cat: "abstract",    url: "https://images.unsplash.com/photo-1462332420958-a05d1e002413?w=900&auto=format&fit=crop" },
    { title: "Wet Asphalt",  cat: "urban",       url: "https://images.unsplash.com/photo-1514565131-fce0801e6f49?w=900&auto=format&fit=crop" },
    { title: "The Archive",  cat: "architecture",url: "https://images.unsplash.com/photo-1507842217343-583bb7270b66?w=900&auto=format&fit=crop" },
    { title: "Face Value",   cat: "portrait",    url: "https://images.unsplash.com/photo-1504703395950-b89145a5425b?w=900&auto=format&fit=crop" },
    { title: "Night Bloom",  cat: "nature",      url: "https://images.unsplash.com/photo-1490750967868-88df5691cc56?w=900&auto=format&fit=crop" },
    { title: "Grid City",    cat: "urban",       url: "https://images.unsplash.com/photo-1477959858617-67f85cf4f1df?w=900&auto=format&fit=crop" },
  ];

  // ── BUILD GRID ──
  const gallery = document.getElementById('gallery');
  let visibleIndices = images.map((_, i) => i);

  function buildGrid(filter) {
    gallery.innerHTML = '';
    visibleIndices = [];

    let anyVisible = false;
    images.forEach((img, i) => {
      const show = filter === 'all' || img.cat === filter;
      if (!show) return;
      anyVisible = true;
      visibleIndices.push(i);

      const item = document.createElement('div');
      item.className = 'gallery-item';
      item.dataset.index = i;
      item.innerHTML = `
        <img src="${img.url}" alt="${img.title}" loading="lazy" />
        <div class="item-overlay">
          <div class="item-title">${img.title}</div>
          <div class="item-cat">${img.cat}</div>
        </div>
        <div class="expand-icon">⤢</div>
      `;
      item.addEventListener('click', () => openLightbox(i));
      gallery.appendChild(item);
    });

    if (!anyVisible) {
      const empty = document.createElement('div');
      empty.className = 'empty-state show';
      empty.textContent = 'No images in this category';
      gallery.appendChild(empty);
    }
  }

  // ── FILTER BUTTONS ──
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      buildGrid(btn.dataset.filter);
    });
  });

  // ── LIGHTBOX ──
  const lightbox = document.getElementById('lightbox');
  const lbImage  = document.getElementById('lb-image');
  const lbTitle  = document.getElementById('lb-title');
  const lbCat    = document.getElementById('lb-cat');
  const lbCounter= document.getElementById('lb-counter');

  let currentLbIndex = 0; // index into visibleIndices
  let currentFilter = 'none';

  function openLightbox(imgIndex) {
    const pos = visibleIndices.indexOf(imgIndex);
    if (pos === -1) return;
    currentLbIndex = pos;
    renderLightbox();
    lightbox.classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function renderLightbox(dir = 0) {
    const imgIndex = visibleIndices[currentLbIndex];
    const img = images[imgIndex];

    if (dir !== 0) {
      lbImage.classList.add('fade-out');
      setTimeout(() => {
        lbImage.src = img.url;
        lbImage.alt = img.title;
        lbImage.style.filter = currentFilter === 'none' ? '' : currentFilter;
        lbImage.classList.remove('fade-out');
      }, 220);
    } else {
      lbImage.src = img.url;
      lbImage.alt = img.title;
      lbImage.style.filter = currentFilter === 'none' ? '' : currentFilter;
    }

    lbTitle.textContent = img.title;
    lbCat.textContent = img.cat;
    lbCounter.textContent = `${currentLbIndex + 1} / ${visibleIndices.length}`;
  }

  function closeLightbox() {
    lightbox.classList.remove('open');
    document.body.style.overflow = '';
    // reset image filter
    currentFilter = 'none';
    document.querySelectorAll('.lb-filter-btn').forEach(b => b.classList.remove('active'));
    document.querySelector('.lb-filter-btn[data-css-filter="none"]').classList.add('active');
  }

  document.getElementById('lb-close').addEventListener('click', closeLightbox);
  lightbox.addEventListener('click', e => { if (e.target === lightbox) closeLightbox(); });

  document.getElementById('lb-prev').addEventListener('click', () => {
    currentLbIndex = (currentLbIndex - 1 + visibleIndices.length) % visibleIndices.length;
    renderLightbox(-1);
  });

  document.getElementById('lb-next').addEventListener('click', () => {
    currentLbIndex = (currentLbIndex + 1) % visibleIndices.length;
    renderLightbox(1);
  });

  // Keyboard nav
  document.addEventListener('keydown', e => {
    if (!lightbox.classList.contains('open')) return;
    if (e.key === 'ArrowLeft')  { currentLbIndex = (currentLbIndex - 1 + visibleIndices.length) % visibleIndices.length; renderLightbox(-1); }
    if (e.key === 'ArrowRight') { currentLbIndex = (currentLbIndex + 1) % visibleIndices.length; renderLightbox(1); }
    if (e.key === 'Escape') closeLightbox();
  });

  // ── IMAGE FILTERS ──
  document.querySelectorAll('.lb-filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.lb-filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentFilter = btn.dataset.cssFilter;
      const val = currentFilter === 'none' ? '' : currentFilter;
      lbImage.style.transition = 'filter 0.35s ease';
      lbImage.style.filter = val;
    });
  });

  // ── INIT ──
  buildGrid('all');
</script>
</body>
</html>
